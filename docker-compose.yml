version: '3.7'

services:
  db:
    image: postgres:15-alpine
    container_name: eng_learning_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /mnt/englishDiplom.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - english_learning_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: /mnt/tank/apps/english-learning/backend
      dockerfile: Dockerfile
    container_name: eng_learning_api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8000"
    volumes:
      - /mnt/backend:/app
      - /mnt/backend/uploads:/app/uploads
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      PORT: 8000
      GIN_MODE: ${GIN_MODE}
      MOODLE_ENABLED: ${MOODLE_ENABLED}
      MOODLE_TEST_MODE: ${MOODLE_TEST_MODE}
      MOODLE_BASE_URL: ${MOODLE_BASE_URL}
      MOODLE_TOKEN: ${MOODLE_TOKEN}
      MOODLE_SERVICE: ${MOODLE_SERVICE}
      MOODLE_AUTO_CREATE: ${MOODLE_AUTO_CREATE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - english_learning_network

  frontend:
    build:
      context: /mnt/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}/api
    container_name: eng_learning_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      VITE_API_URL: ${API_URL}/api
    depends_on:
      - backend
    networks:
      - english_learning_network

  adminer:
    image: adminer:latest
    container_name: eng_learning_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - english_learning_network

volumes:
  postgres_data:

networks:
  english_learning_network:
    driver: bridge